<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark AR - Documentation Driven</title>
    <style>body { margin: 0; background: #000; overflow: hidden; }</style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { SplatMesh, SparkRenderer } from '@sparkjsdev/spark';

        async function init() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
            const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(ARButton.createButton(renderer));

            // SparkRenderer を明示的に追加
            const spark = new SparkRenderer({ renderer: renderer });
            scene.add(spark);

            const splatURL = 'https://sparkjs.dev/assets/splats/butterfly.spz';
            
            // SplatMesh の作成
            const splats = new SplatMesh({ 
                url: splatURL,
                // ドキュメントのヒント：毎フレーム実行される更新処理
                onFrame: ({ mesh }) => {
                    if (renderer.xr.isPresenting) {
                        mesh.rotation.y += 0.01;
                        // 強制的に再生成・描画を促す
                        mesh.updateVersion(); 
                    }
                }
            });

            // ドキュメントのヒント：初期化を await で待つ
            try {
                await splats.initialized;
                console.log("SplatMesh Initialized");
                
                // OpenCV -> OpenGL 座標変換（ドキュメントの別項に記載あり）
                splats.quaternion.set(1, 0, 0, 0);
                splats.position.set(0, 0, -1);
                scene.add(splats);
            } catch (e) {
                console.error("Initialization failed", e);
            }

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }
        init();
    </script>
</body>
</html>
