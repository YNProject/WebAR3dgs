<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butterfly AR Final Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #0f0; font-family: monospace; }
        #status { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 15px; z-index: 10000; }
        #ARButton { bottom: 50px !important; background: #0f0 !important; color: #000 !important; border-radius: 8px !important; }
    </style>
</head>
<body>
    <div id="status">Status: Loading...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const log = (m) => { document.getElementById('status').innerText = "Status: " + m; };

        async function init() {
            try {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
                
                // alpha: true はARにおいて絶対必須です
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.xr.enabled = true;
                document.body.appendChild(renderer.domElement);

                document.body.appendChild(ARButton.createButton(renderer));
                log("Ready. Tap START AR.");

                const splatURL = "https://sparkjs.dev/assets/splats/butterfly.spz";
                const butterfly = new SplatMesh({ 
                    url: splatURL,
                    onLoad: () => {
                        log("Butterfly Ready! Look at your hand height.");
                        // 描画順を最前面に
                        butterfly.renderOrder = 999;
                        // ARで見失わないようにかなり手前(0.5m)に配置
                        butterfly.position.set(0, 0, -0.5);
                    }
                });
                scene.add(butterfly);

                // WebXR専用のループ処理
                renderer.setAnimationLoop(() => {
                    if (butterfly) {
                        butterfly.rotation.y += 0.02;
                    }
                    renderer.render(scene, camera);
                });

            } catch (e) {
                log("Error: " + e.message);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
