<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Final Test</title>
    <style>
        body { margin: 0; background-color: #111; color: #0f0; font-family: monospace; }
        #status {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.8); padding: 10px; z-index: 10000;
            font-size: 14px; border-bottom: 1px solid #0f0;
        }
        #ARButton { bottom: 50px !important; }
    </style>
</head>
<body>
    <div id="status">Status: 起動プロセス開始...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const status = document.getElementById('status');
        const log = (m) => { status.innerText = "Status: " + m; console.log(m); };

        async function init() {
            try {
                log("ライブラリ読み込み完了。シーンを作成中...");
                
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.xr.enabled = true;
                document.body.appendChild(renderer.domElement);

                const btn = ARButton.createButton(renderer);
                document.body.appendChild(btn);
                log("準備完了！下の【START AR】ボタンを押してください。");

                // モデル読み込み
                const splat = new SplatMesh({ 
                    url: "./model/A.spz",
                    onLoad: () => log("モデル表示中！カメラを動かして探してください"),
                    onError: (e) => log("エラー: ./model/A.spz が見つかりません")
                });
                
                splat.position.set(0, 0, -2);
                scene.add(splat);

                renderer.setAnimationLoop(() => {
                    renderer.render(scene, camera);
                });

            } catch (e) {
                log("致命的エラー: " + e.message);
            }
        }

        // ページ読み込み完了後に実行
        window.addEventListener('load', init);
    </script>
</body>
</html>
