<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DGS AR Force Finder</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #status { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 8px; z-index: 100; font-size: 11px; }
        #ARButton { bottom: 50px !important; background: #0f0 !important; color: #000 !important; }
    </style>
</head>
<body>
    <div id="status">Status: Initializing...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const log = (m) => { document.getElementById('status').innerText += "\n> " + m; };
        
        async function init() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(ARButton.createButton(renderer));

            const modelUrl = new URL('./model/A.spz', window.location.href).href;
            
            const splat = new SplatMesh({ 
                url: modelUrl,
                onLoad: () => {
                    log("LOAD SUCCESS!");
                    // モデルを非常に小さくして原点に。
                    splat.scale.set(0.05, 0.05, 0.05);
                    splat.position.set(0, 0, -1.5); // カメラの目の前
                    splat.frustumCulled = false; // 画面外判定で消えるのを防ぐ
                }
            });
            scene.add(splat);

            // 環境光も念のため追加
            scene.add(new THREE.AmbientLight(0xffffff, 2));

            renderer.setAnimationLoop(() => {
                // ARセッション中、モデルが常にカメラの方向を向く（または一定距離を保つ）
                // 最初に見つけるまでは、自動で少しずつ回転させておく
                if (splat) splat.rotation.y += 0.01;
                renderer.render(scene, camera);
            });
        }
        window.addEventListener('load', init);
    </script>
</body>
</html>
