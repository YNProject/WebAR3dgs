<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark • WebAR Override</title>
    <style>
      body { margin: 0; background: transparent; overflow: hidden; }
      /* カメラ映像を一番奥、3Dをその上に配置 */
      video, canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
      #status { position: fixed; top: 10px; left: 10px; color: #0f0; z-index: 100; background: rgba(0,0,0,0.5); font-family: monospace; }
      #ARButton { bottom: 50px !important; z-index: 1000; }
    </style>
  </head>
  <body>
    <div id="status">Status: 待機中...</div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from 'three';
      import { ARButton } from 'three/addons/webxr/ARButton.js';
      import { SplatMesh } from '@sparkjsdev/spark';

      const log = (m) => { document.getElementById('status').innerText = m; };

      async function init() {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);

        // レンダラー設定を極限までシンプルに
        const renderer = new THREE.WebGLRenderer({ 
            alpha: true, 
            antialias: false,
            preserveDrawingBuffer: true 
        });
        renderer.setPixelRatio(1);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        document.body.appendChild(ARButton.createButton(renderer));

        // バタフライ
        const splatURL = 'https://sparkjs.dev/assets/splats/butterfly.spz';
        const butterfly = new SplatMesh({ 
            url: splatURL,
            onLoad: () => {
                log("Butterfly Loaded!");
                butterfly.position.set(0, 0, -1);
                scene.add(butterfly);
            }
        });

        renderer.setAnimationLoop(() => {
            if (renderer.xr.isPresenting) {
                log("AR Session Active");
                if (butterfly) butterfly.rotation.y += 0.02;
            }
            renderer.render(scene, camera);
        });
      }

      init().catch(e => log("Error: " + e.message));
    </script>
  </body>
</html>
