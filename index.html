<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark • WebAR Support</title>
    <style>
      body { margin: 0; background-color: #000; color: white; }
      /* ボタンが確実に画面に映るようにする */
      #ARButton {
        bottom: 50px !important;
        background: rgba(255, 255, 255, 0.9) !important;
        color: black !important;
      }
    </style>
  </head>

  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from 'three';
      // ここでエラーが起きないよう、パスを addons/ 経由に変更
      import { ARButton } from 'three/addons/webxr/ARButton.js';
      import { SplatMesh } from '@sparkjsdev/spark';

      async function init() {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ボタンを表示
        const btn = ARButton.createButton(renderer);
        document.body.appendChild(btn);

        const splatURL = 'https://sparkjs.dev/assets/splats/butterfly.spz';
        const butterfly = new SplatMesh({ url: splatURL });
        butterfly.position.set(0, 0, -1);
        scene.add(butterfly);

        let lastTime;
        renderer.setAnimationLoop(function animate(time) {
          const deltaTime = time - (lastTime || time);
          lastTime = time;
          if (butterfly) butterfly.rotation.y += deltaTime / 2500;
          renderer.render(scene, camera);
        });
      }

      init().catch(err => {
        // エラーが出たら画面に表示する
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.innerHTML = 'Error: ' + err.message;
        document.body.appendChild(div);
      });
    </script>
  </body>
</html>
