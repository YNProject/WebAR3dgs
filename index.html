<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark 2.0 WebAR Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ar-button {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); padding: 12px 24px;
            background: #fff; border: none; border-radius: 8px; font-weight: bold;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
            "three/addons/": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        // --- シーン設定 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true; // WebXRを有効化
        document.body.appendChild(renderer.domElement);

        // AR開始ボタンを追加
        document.body.appendChild(ARButton.createButton(renderer));

        // --- Spark 2.0 スプラット読み込み ---
        // A.spz が同じフォルダにある想定です
        const splat = new SplatMesh({ url: "A.spz" });
        
        // カメラの目の前（3m奥）に配置
        splat.position.set(0, 0, -3);
        scene.add(splat);

        // --- レンダリングループ ---
        renderer.setAnimationLoop(() => {
            // 必要に応じて回転させる
            // splat.rotation.y += 0.01;
            renderer.render(scene, camera);
        });

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
