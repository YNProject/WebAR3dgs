<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SupercupWebAR Spark Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.js",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="overlay">
        <div class="container">
            <h1>SupercupWebAR</h1>
            <p>下のマーカーをスキャンしてください</p>
            <div class="marker-guide">
                <div class="guide-item"><img src="img/sc1bcc.png"></div>
                <div class="guide-item"><img src="img/sc2ots.png"></div>
            </div>
            <button id="startButton">ARを開始する</button>
        </div>
    </div>

    <div id="ui-container">
        <button id="backButton">タイトルへ戻る</button>
        <button id="shopButton">詳しく見る</button>
    </div>

    <div id="ar-container"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
