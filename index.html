<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Path Debug</title>
    <style>
        body { margin: 0; background-color: #000; color: #0f0; font-family: monospace; }
        #status {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.8); padding: 10px; z-index: 10000;
            font-size: 12px; border-bottom: 1px solid #0f0; white-space: pre-wrap;
        }
        #ARButton { bottom: 50px !important; }
    </style>
</head>
<body>
    <div id="status">Status: Initializing...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const status = document.getElementById('status');
        const log = (m) => { 
            status.innerText += "\n> " + m; 
            console.log(m);
        };

        async function init() {
            try {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.xr.enabled = true;
                document.body.appendChild(renderer.domElement);
                document.body.appendChild(ARButton.createButton(renderer));

                log("Three.js Ready.");

                // --- パスの解決 ---
                // GitHub Pagesのサブディレクトリ対策として、絶対URLを生成
                const modelUrl = new URL('./model/A.spz', window.location.href).href;
                log("Trying to load: " + modelUrl);

                const splat = new SplatMesh({ 
                    url: modelUrl,
                    onLoad: () => {
                        log("SUCCESS: A.spz loaded!");
                        // 見つかりやすいように大きく、正面に配置
                        splat.scale.set(1, 1, 1);
                        splat.position.set(0, 0, -1.5); 
                    },
                    onError: (err) => {
                        log("ERROR: Could not load file. Check if 'model/A.spz' exists and case-sensitivity.");
                    }
                });
                
                scene.add(splat);

                renderer.setAnimationLoop(() => {
                    if (splat) splat.rotation.y += 0.01;
                    renderer.render(scene, camera);
                });

            } catch (e) {
                log("FATAL: " + e.message);
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
