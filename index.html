<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark 2.0 WebAR</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        /* ARボタンを見やすく調整 */
        #ARButton {
            bottom: 50px !important;
            background: rgba(255, 255, 255, 0.9) !important;
            color: black !important;
            border: none !important;
            border-radius: 4px !important;
            font-weight: bold !important;
        }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            font-size: 12px;
            z-index: 9999;
            pointer-events: none;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="status">Status: 準備中...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
            "three/addons/": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const statusElement = document.getElementById('status');
        function log(msg) {
            statusElement.innerHTML += "<br>" + msg;
            console.log(msg);
        }

        async function init() {
            try {
                // --- シーン基本設定 ---
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
                
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.xr.enabled = true; // WebXR有効化
                document.body.appendChild(renderer.domElement);

                // AR開始ボタンを追加
                const arButton = ARButton.createButton(renderer);
                document.body.appendChild(arButton);
                log("Three.js初期化完了。ARボタンを確認してください。");

                // --- 3DGSモデルの読み込み ---
                // model フォルダ内の A.spz を参照
                const modelPath = "./model/A.spz";
                log(`モデル読み込み開始: ${modelPath}`);

                const splat = new SplatMesh({ 
                    url: modelPath,
                    onLoad: () => {
                        log("A.spz のロードに成功しました！");
                    },
                    onError: (err) => {
                        log("エラー: モデルが見つかりません。パスを確認してください。");
                        console.error(err);
                    }
                });

                // 初期位置：カメラの正面2m、少し下(-1m)に配置
                splat.position.set(0, -1, -2);
                scene.add(splat);

                // --- アニメーションループ ---
                renderer.setAnimationLoop(() => {
                    // モデルをゆっくり回転させる（動作確認用）
                    if (splat) splat.rotation.y += 0.005;
                    renderer.render(scene, camera);
                });

                // ウィンドウリサイズ対応
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (e) {
                log("致命的なエラー: " + e.message);
            }
        }

        init();
    </script>
</body>
</html>
