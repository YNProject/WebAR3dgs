<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DGS AR Final Fix</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; }
        #status { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 8px; z-index: 100; font-size: 11px; }
        #ARButton { bottom: 50px !important; }
    </style>
</head>
<body>
    <div id="status">Status: 準備中...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const log = (m) => { document.getElementById('status').innerText += "\n> " + m; };

        async function init() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(ARButton.createButton(renderer));

            const modelUrl = new URL('./model/A.spz', window.location.href).href;
            
            const splat = new SplatMesh({ 
                url: modelUrl,
                onLoad: () => {
                    log("LOAD SUCCESS!");
                    
                    // --- 強制中心補正アルゴリズム ---
                    // 1. バウンディングボックス（モデルの範囲）を計算
                    const box = new THREE.Box3().setFromObject(splat);
                    const center = new THREE.Vector3();
                    box.getCenter(center);
                    
                    // 2. モデル自体の位置をマイナス方向にずらして「中心」を(0,0,0)にする
                    splat.position.sub(center);
                    
                    // 3. 全体をまとめる親グループを作成して、カメラの前に配置
                    const wrapper = new THREE.Group();
                    scene.add(wrapper);
                    wrapper.add(splat);
                    
                    // スケール調整（PCで見えたなら0.1〜1.0くらいが適正なはず）
                    wrapper.scale.set(0.1, 0.1, 0.1);
                    wrapper.position.set(0, 0, -1); // カメラの1m正面に固定
                    
                    log("Model centered and moved to camera front.");
                }
            });

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }
        window.addEventListener('load', init);
    </script>
</body>
</html>
