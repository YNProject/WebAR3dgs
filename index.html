<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Professional AR</title>
    <style>body { margin: 0; background: #000; }</style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { SplatMesh, SparkRenderer } from '@sparkjsdev/spark';

        async function init() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
            
            const renderer = new THREE.WebGLRenderer({ 
                antialias: false, // ドキュメント推奨：絶対false
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(ARButton.createButton(renderer));

            // --- ドキュメントのヒントを全投入 ---
            const spark = new SparkRenderer({ 
                renderer: renderer,
                preUpdate: true,      // WebXRで強制的に更新を回す
                sortRadial: true,     // WebXRで回転しても安定させる
                lodSplatCount: 500000, // WebXR向けに軽量化
                depthTest: false,     // 確実に最前面に出す
                transparent: true     // 透明Passで描画
            });
            scene.add(spark);

            const splatURL = 'https://sparkjs.dev/assets/splats/butterfly.spz';
            const butterfly = new SplatMesh({ 
                url: splatURL,
                onLoad: () => {
                    butterfly.position.set(0, 0, -1);
                    console.log("Butterfly Loaded");
                }
            });
            scene.add(butterfly);

            renderer.setAnimationLoop(() => {
                if (butterfly) butterfly.rotation.y += 0.01;
                
                // WebXR環境では手動で update を呼ぶのが安全
                if (renderer.xr.isPresenting) {
                    spark.update({ scene, camera });
                }
                
                renderer.render(scene, camera);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
