<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DGS AR Mass Display</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #0f0; font-family: monospace; }
        #status { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 15px; z-index: 10000; font-size: 11px; }
        #ARButton { bottom: 50px !important; background: #0f0 !important; color: #000 !important; }
    </style>
</head>
<body>
    <div id="status">Status: 準備中...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const log = (m) => { document.getElementById('status').innerText = "Status: " + m; };

        async function init() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(ARButton.createButton(renderer));

            log("READY: START ARを押して、周囲を見渡してください");

            const splatURL = "https://sparkjs.dev/assets/splats/butterfly.spz";
            
            // --- 大量配置の処理 ---
            const count = 12; // 12匹配置する
            const butterflies = [];

            for (let i = 0; i < count; i++) {
                const butterfly = new SplatMesh({ 
                    url: splatURL,
                    onLoad: () => {
                        log(`${i+1}/${count} 読み込み完了！`);
                        butterfly.renderOrder = 999;
                    }
                });

                // 円状に配置しつつ、高さもランダムに変える
                const angle = (i / count) * Math.PI * 2;
                const radius = 2.0; // 半径2メートルの円
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const y = (Math.random() - 0.5) * 2; // 地面から見上げる高さまでランダム

                butterfly.position.set(x, y, z);
                // 全ての蝶が中心（あなた）を向くように調整
                butterfly.lookAt(0, 0, 0);
                
                scene.add(butterfly);
                butterflies.push(butterfly);
            }

            renderer.setAnimationLoop(() => {
                butterflies.forEach(b => {
                    if (b) b.rotation.z += 0.01; // 少し動きをつける
                });
                renderer.render(scene, camera);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
