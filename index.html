<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug WebAR</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; }
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; z-index: 100; font-size: 12px; }
    </style>
</head>
<body>
    <div id="status">Status: 起動中...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
            "three/addons/": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const status = document.getElementById('status');
        
        try {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // ARボタンを追加
            const btn = ARButton.createButton(renderer);
            document.body.appendChild(btn);
            status.innerHTML = "Status: Three.js起動完了。ARボタンを確認してください。";

            // Splat読み込み
            status.innerHTML += "<br>A.spzを読み込み中...";
            const splat = new SplatMesh({ 
                url: "A.spz",
                onLoad: () => {
                    status.innerHTML += "<br>A.spz読み込み成功！";
                    splat.position.set(0, 0, -2);
                },
                onError: (err) => {
                    status.innerHTML += "<br>エラー: A.spzが見つからないか壊れています。";
                    console.error(err);
                }
            });
            scene.add(splat);

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });

        } catch (e) {
            status.innerHTML = "エラー発生: " + e.message;
            console.error(e);
        }
    </script>
</body>
</html>
