<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark 2.0 Butterfly AR Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #status {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.8); color: #0f0; padding: 10px;
            font-family: monospace; font-size: 12px; z-index: 10000;
        }
    </style>
</head>
<body>
    <div id="status">Status: Initializing...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
            "three/addons/": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const status = document.getElementById('status');
        const log = (m) => { status.innerText = "Status: " + m; };

        async function init() {
            try {
                // 1. シーンとレンダラーのセットアップ
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
                
                const renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true // AR背景のために必須
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.xr.enabled = true; // WebXRを有効化
                document.body.appendChild(renderer.domElement);

                // 2. ARボタンの追加
                document.body.appendChild(ARButton.createButton(renderer));
                log("Ready. Tap 'START AR' button below.");

                // 3. バタフライモデルの読み込み
                const splatURL = "https://sparkjs.dev/assets/splats/butterfly.spz";
                const butterfly = new SplatMesh({ 
                    url: splatURL,
                    onLoad: () => {
                        log("Butterfly Loaded! Look around.");
                    }
                });

                // ARで見つけやすいように配置を調整
                // (0, 0, -1.5) はカメラの1.5m正面
                butterfly.position.set(0, 0, -1.5);
                scene.add(butterfly);

                // 4. アニメーションループ
                renderer.setAnimationLoop(() => {
                    if (butterfly) {
                        butterfly.rotation.y += 0.01;
                    }
                    renderer.render(scene, camera);
                });

                // リサイズ対応
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (e) {
                log("Error: " + e.message);
            }
        }

        init();
    </script>
</body>
</html>
