<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark • WebAR Fix</title>
    <style>
      body { margin: 0; background-color: #000; overflow: hidden; }
      #ARButton { bottom: 50px !important; }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from 'three';
      import { ARButton } from 'three/addons/webxr/ARButton.js';
      import { SplatMesh } from '@sparkjsdev/spark';

      async function init() {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);

        const renderer = new THREE.WebGLRenderer({ 
            alpha: true, 
            antialias: false, // 負荷軽減
            powerPreference: "high-performance" // GPUを優先
        });
        renderer.setPixelRatio(1); // 解像度を抑えてフリーズ防止
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        const btn = ARButton.createButton(renderer);
        document.body.appendChild(btn);

        const splatURL = 'https://sparkjs.dev/assets/splats/butterfly.spz';
        let butterfly;

        // モデル読み込みを非同期で行い、完了後にシーンに追加
        const loadModel = () => {
            butterfly = new SplatMesh({ 
                url: splatURL,
                onLoad: () => {
                    butterfly.position.set(0, 0, -2);
                    scene.add(butterfly);
                    console.log("Butterfly Loaded");
                }
            });
        };

        loadModel();

        renderer.setAnimationLoop((time, frame) => {
            // ARセッション中のみ更新
            if (renderer.xr.isPresenting) {
                if (butterfly) {
                    butterfly.rotation.y += 0.01;
                }
            }
            renderer.render(scene, camera);
        });
      }

      init();
    </script>
  </body>
</html>
