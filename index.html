<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butterfly AR - Final Attempt</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #0f0; font-family: monospace; }
        #status {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.9); padding: 15px; z-index: 10000;
        }
    </style>
</head>
<body>
    <div id="status">Status: Loading Libraries...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/preview/2.0.0/spark.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { ARButton } from "three/addons/webxr/ARButton.js";
        import { SplatMesh } from "@sparkjsdev/spark";

        const log = (m) => { document.getElementById('status').innerText = "Status: " + m; };

        async function init() {
            try {
                log("Setting up Scene...");
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
                
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.xr.enabled = true;
                document.body.appendChild(renderer.domElement);

                // ボタン作成
                const btn = ARButton.createButton(renderer);
                document.body.appendChild(btn);
                log("Libraries Loaded! Tap 'START AR' at the bottom.");

                // バタフライ読み込み
                const splatURL = "https://sparkjs.dev/assets/splats/butterfly.spz";
                const butterfly = new SplatMesh({ 
                    url: splatURL,
                    onLoad: () => log("Butterfly Ready in AR!")
                });

                butterfly.position.set(0, 0, -1.5);
                scene.add(butterfly);

                renderer.setAnimationLoop(() => {
                    if (butterfly) butterfly.rotation.y += 0.01;
                    renderer.render(scene, camera);
                });

            } catch (e) {
                log("Error: " + e.message);
                console.error(e);
            }
        }

        // 念のため window.onload で実行
        window.onload = init;
    </script>
</body>
</html>
